<!DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8">
    <title>Погода</title>

    <script src="eel.js"></script>
    <link rel="icon" type="image/png" href="/favicon.png">

    <link rel="stylesheet" type="text/css" href="main.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
<body>

  <input id="location" type="text" placeholder="Введите название страны и города"  required="" value="Osh">

  <button id="show">Узнать погоду</button>
  <div class="linear"></div>
  <div id="info"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  
  <script type="text/javascript">
    //тут пишем JS код для вызова Python функций

    async function display_weather(){
      let place=document.getElementById('location').value;
      let res=await eel.get_weather(place)();
      document.getElementById('info').innerHTML=res;
    }
    jQuery('#show').on('click', function(){
      // при клике на кнопку отображаем погоду 
      display_weather();});
  </script>
</body>
</html>
